<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ratiba ya Vipindi – Nguliguli Secondary</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
    header { text-align:center; margin-bottom:30px; }
    header h1 { color:#1a73e8; font-size:2.5em; margin:0; }
    header h2 { color:#555; font-size:1.5em; margin:5px 0; }
    header p { color:#777; margin:5px 0; font-size:1em; }
    h2.form-title { color:#1a73e8; margin-top:30px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 30px; }
    th, td { border: 1px solid #999; padding: 8px; text-align: left; }
    th { background-color: #1a73e8; color: white; }
    select, input[type="time"] {
      width: 100%;
      box-sizing: border-box;
      padding: 4px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    td select:focus, td input:focus { border-color: #1a73e8; outline: none; }
  </style>
</head>
<body>

<header>
  <h1>Nguliguli Secondary School</h1>
  <h2>Ratiba ya Vipindi – Form 1 hadi 4</h2>
  <p>Tafadhali chagua mwalimu na muda kila kipindi</p>
</header>

<script>
  const walimu = [
    "Chinula A.", "Mwakyusa B.", "Juma C.", "Mushi D.", "Nyoni E.", 
    "Kabaka F.", "Makundi G.", "Hussein H.", "Omari I.", "Baraka J."
  ];

  function generateTeacherDropdown() {
    let dropdown = '<select>';
    dropdown += '<option value="">Chagua mwalimu</option>';
    walimu.forEach(name => {
      dropdown += `<option value="${name}">${name}</option>`;
    });
    dropdown += '</select>';
    return dropdown;
  }

  function addDropdowns() {
    const tds = document.querySelectorAll('td.teacher');
    tds.forEach(td => {
      td.innerHTML = generateTeacherDropdown();
    });
  }

  window.onload = addDropdowns;

  function generateTimetable(formName, schedule) {
    document.write(`<h2 class="form-title">${formName}</h2><table>
      <tr>
        <th>Siku</th>
        <th>Kipindi</th>
        <th>Somo</th>
        <th>Muda</th>
        <th>Mwalimu</th>
      </tr>`);

    schedule.forEach(day => {
      const rowspan = day.periods.length;
      day.periods.forEach((period, index) => {
        document.write('<tr>');
        if(index === 0){
          document.write(`<td rowspan="${rowspan}">${day.siku}</td>`);
        }
        document.write(`<td>${period.kipindi}</td>`);
        document.write(`<td>${period.somo}</td>`);
        document.write(`<td><input type="time" value="${period.muda}"></td>`);
        document.write('<td class="teacher"></td>');
        document.write('</tr>');
      });
    });

    document.write('</table>');
  }

  // Schedules
  const form1Schedule = [
    {siku:"Jumatatu", periods:[{kipindi:1, somo:"Mathematics", muda:"08:00"}, {kipindi:2, somo:"Kiswahili", muda:"08:45"}, {kipindi:3, somo:"English Language", muda:"09:30"}]},
    {siku:"Jumanne", periods:[{kipindi:1, somo:"Biology", muda:"08:00"}, {kipindi:2, somo:"History", muda:"08:45"}, {kipindi:3, somo:"Geography", muda:"09:30"}]},
    {siku:"Jumatano", periods:[{kipindi:1, somo:"Chemistry", muda:"08:00"}, {kipindi:2, somo:"Mathematics", muda:"08:45"}, {kipindi:3, somo:"English Literature", muda:"09:30"}]},
    {siku:"Alhamisi", periods:[{kipindi:1, somo:"Physics", muda:"08:00"}, {kipindi:2, somo:"Business Studies", muda:"08:45"}, {kipindi:3, somo:"Kiswahili", muda:"09:30"}]},
    {siku:"Ijumaa", periods:[{kipindi:1, somo:"Biology", muda:"08:00"}, {kipindi:2, somo:"English Language", muda:"08:45"}, {kipindi:3, somo:"History", muda:"09:30"}]}
  ];

  const form2Schedule = [
    {siku:"Jumatatu", periods:[{kipindi:1, somo:"Physics", muda:"08:00"}, {kipindi:2, somo:"Business Studies", muda:"08:45"}, {kipindi:3, somo:"English Literature", muda:"09:30"}]},
    {siku:"Jumanne", periods:[{kipindi:1, somo:"Mathematics", muda:"08:00"}, {kipindi:2, somo:"Kiswahili", muda:"08:45"}, {kipindi:3, somo:"Biology", muda:"09:30"}]},
    {siku:"Jumatano", periods:[{kipindi:1, somo:"Chemistry", muda:"08:00"}, {kipindi:2, somo:"English Language", muda:"08:45"}, {kipindi:3, somo:"History", muda:"09:30"}]},
    {siku:"Alhamisi", periods:[{kipindi:1, somo:"Physics", muda:"08:00"}, {kipindi:2, somo:"Geography", muda:"08:45"}, {kipindi:3, somo:"Business Studies", muda:"09:30"}]},
    {siku:"Ijumaa", periods:[{kipindi:1, somo:"Mathematics", muda:"08:00"}, {kipindi:2, somo:"Kiswahili", muda:"08:45"}, {kipindi:3, somo:"English Literature", muda:"09:30"}]}
  ];

  const form3Schedule = [
    {siku:"Jumatatu", periods:[{kipindi:1, somo:"Chemistry", muda:"08:00"}, {kipindi:2, somo:"Mathematics", muda:"08:45"}, {kipindi:3, somo:"Kiswahili", muda:"09:30"}]},
    {siku:"Jumanne", periods:[{kipindi:1, somo:"Physics", muda:"08:00"}, {kipindi:2, somo:"English Language", muda:"08:45"}, {kipindi:3, somo:"Biology", muda:"09:30"}]},
    {siku:"Jumatano", periods:[{kipindi:1, somo:"Business Studies", muda:"08:00"}, {kipindi:2, somo:"English Literature", muda:"08:45"}, {kipindi:3, somo:"History", muda:"09:30"}]},
    {siku:"Alhamisi", periods:[{kipindi:1, somo:"Mathematics", muda:"08:00"}, {kipindi:2, somo:"Kiswahili", muda:"08:45"}, {kipindi:3, somo:"Geography", muda:"09:30"}]},
    {siku:"Ijumaa", periods:[{kipindi:1, somo:"Physics", muda:"08:00"}, {kipindi:2, somo:"Biology", muda:"08:45"}, {kipindi:3, somo:"Chemistry", muda:"09:30"}]}
  ];

  const form4Schedule = [
    {siku:"Jumatatu", periods:[{kipindi:1, somo:"Physics", muda:"08:00"}, {kipindi:2, somo:"Biology", muda:"08:45"}, {kipindi:3, somo:"History", muda:"09:30"}]},
    {siku:"Jumanne", periods:[{kipindi:1, somo:"Mathematics", muda:"08:00"}, {kipindi:2, somo:"Kiswahili", muda:"08:45"}, {kipindi:3, somo:"English Literature", muda:"09:30"}]},
    {siku:"Jumatano", periods:[{kipindi:1, somo:"Chemistry", muda:"08:00"}, {kipindi:2, somo:"English Language", muda:"08:45"}, {kipindi:3, somo:"Business Studies", muda:"09:30"}]},
    {siku:"Alhamisi", periods:[{kipindi:1, somo:"Physics", muda:"08:00"}, {kipindi:2, somo:"Geography", muda:"08:45"}, {kipindi:3, somo:"Mathematics", muda:"09:30"}]},
    {siku:"Ijumaa", periods:[{kipindi:1, somo:"Biology", muda:"08:00"}, {kipindi:2, somo:"History", muda:"08:45"}, {kipindi:3, somo:"Kiswahili", muda:"09:30"}]}
  ];

  generateTimetable("Form 1", form1Schedule);
  generateTimetable("Form 2", form2Schedule);
  generateTimetable("Form 3", form3Schedule);
  generateTimetable("Form 4", form4Schedule);
</script>

</body>
</html>
