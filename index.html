<script>

/* SETTINGS */
let settings={
  sound:"https://actions.google.com/sounds/v1/alarms/school_bell.ogg"
};

let savedSettings=localStorage.getItem("settings");
if(savedSettings){
  settings=JSON.parse(savedSettings);
}

/* SOUND PLAYER */
function playSound(){
  let audio=new Audio(settings.sound);
  audio.play();
}

/* MENU */
function openMenu(){document.getElementById("menu").style.width="250px";}
function closeMenu(){document.getElementById("menu").style.width="0";}
function showOffice(id){
document.querySelectorAll('.office').forEach(o=>o.style.display="none");
document.getElementById(id).style.display="block";
}
function closeOffice(){
document.querySelectorAll('.office').forEach(o=>o.style.display="none");
}

/* LANGUAGE SWITCH */
let lang='sw';
function toggleLanguage(){
if(lang==='sw'){
lang='eng';
document.getElementById('langBtn').innerText='ENG';
document.getElementById('notificationText').innerText="Period started – Please select subject, teacher, and time";
document.getElementById('headerForm').innerText="Form One to Form Four";
}else{
lang='sw';
document.getElementById('langBtn').innerText='SW';
document.getElementById('notificationText').innerText="Kipindi kimeanza – Tafadhali chagua somo, mwalimu, na muda";
document.getElementById('headerForm').innerText="Form One hadi Form Four";
}
}

/* RESET */
function resetData(){
localStorage.clear();
location.reload();
}

/* WALIMU NA MASOMO */
const walimu=[
"Denis Maige","Damiani Lushinge","Omari Mniru","Mario Maketa","Method Maginga",
"Samwel Msabila","Mwansiti Mbwana","Agness Tarence","Joyce Makoli",
"Nicholous Godfrey","Petro Benjamin","Kinunda Godfrid","Baraka John"
];

const masomo=[
"Physics","History","Biology","Mathematics","Business Studies",
"Chemistry","English Language","English Literature","Civics",
"Geography","Kiswahili"
];

/* SAVE + HIDE */
function saveRowAndFilter(button){

let row=button.closest("tr");
let table=row.closest("table");

let subject=row.querySelector(".subject select").value;

localStorage.setItem("savedRow",JSON.stringify({
table:table.className,
row:Array.from(row.parentNode.children).indexOf(row)
}));

alert("Kipindi cha "+subject+" kimehifadhiwa");

table.querySelectorAll("tr").forEach(r=>{
if(r!==row && r.querySelector("td")) r.style.display="none";
});

playSound();
}

/* EDIT */
function editRows(button){

let table=button.closest("table");

table.querySelectorAll("tr").forEach(r=>{
if(r.querySelector("td")) r.style.display="table-row";
});

localStorage.removeItem("savedRow");

playSound();

if("Notification" in window){

if(Notification.permission==="granted"){
new Notification("Editing",{body:"Unaweza ku-edit vipindi vyote",icon:"icon-192x192.png"});
}else{
Notification.requestPermission();
}

}

}

/* DROPDOWN */
function dropdown(list){
return '<select>'+list.map(i=>`<option>${i}</option>`).join('')+'</select>';
}

function addDropdowns(){
document.querySelectorAll('.subject').forEach(td=>{
td.innerHTML=dropdown(masomo);
});

document.querySelectorAll('.teacher').forEach(td=>{
td.innerHTML=dropdown(walimu);
});
}

/* AUTO BELL */
function checkBell(){

let now=new Date();
let current=now.getHours().toString().padStart(2,'0')+":"+
now.getMinutes().toString().padStart(2,'0');

document.querySelectorAll('input[type="time"]').forEach(t=>{

if(t.value===current){

let bell=document.getElementById("bellNotice");
bell.style.display="block";

playSound();

if("Notification" in window){

if(Notification.permission==="granted"){
new Notification("Kipindi Kimeanza",{
body:"Muda wa kipindi umefika",
icon:"icon-192x192.png"
});
}else{
Notification.requestPermission();
}

}

setTimeout(()=>{
bell.style.display="none";
},10000);

}

});

}

setInterval(checkBell,60000);

/* REPORT */
function generateReport(){

let subjects={};

document.querySelectorAll("table tr").forEach(row=>{

let subject=row.querySelector(".subject select");

if(subject){

let sub=subject.value;

if(!subjects[sub]) subjects[sub]=0;

subjects[sub]++;

}

});

let table=document.getElementById("reportTable");

table.innerHTML="<tr><th>Somo</th><th>Jumla</th></tr>";

for(let s in subjects){
table.innerHTML+=`<tr><td>${s}</td><td>${subjects[s]}</td></tr>`;
}

}

/* RATIBA */
function generate(formName,schedule,style){

document.write('<h2>'+formName+'</h2>');
document.write('<table class="'+style+'">');
document.write('<tr><th>Siku</th><th>Kipindi</th><th>Somo</th><th>Muda</th><th>Mwalimu</th><th>Edit</th><th>Save</th></tr>');

schedule.forEach(day=>{

let rowspan=day.periods.length;

day.periods.forEach((p,i)=>{

document.write("<tr>");

if(i==0) document.write('<td rowspan="'+rowspan+'">'+day.siku+'</td>');

document.write('<td>'+p.kipindi+'</td>');
document.write('<td class="subject"></td>');
document.write('<td><input type="time" value="'+p.muda+'"></td>');
document.write('<td class="teacher"></td>');
document.write('<td><button class="editBtn" onclick="editRows(this)">Edit</button></td>');
document.write('<td><button class="saveBtn" onclick="saveRowAndFilter(this)">Save</button></td>');

document.write("</tr>");

});

});

document.write("</table>");

}

/* SCHEDULE */

const schedule=[

{siku:"Jumatatu",periods:[
{kipindi:1,muda:"08:00"},
{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},
{kipindi:4,muda:"10:15"}]},

{siku:"Jumanne",periods:[
{kipindi:1,muda:"08:00"},
{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},
{kipindi:4,muda:"10:15"}]},

{siku:"Jumatano",periods:[
{kipindi:1,muda:"08:00"},
{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},
{kipindi:4,muda:"10:15"}]},

{siku:"Alhamisi",periods:[
{kipindi:1,muda:"08:00"},
{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},
{kipindi:4,muda:"10:15"}]},

{siku:"Ijumaa",periods:[
{kipindi:1,muda:"08:00"},
{kipindi:2,muda:"08:45"},
{kipindi:3,muda:"09:30"},
{kipindi:4,muda:"10:15"}]}

];

generate("Form One",schedule,"form1");
generate("Form Two",schedule,"form2");
generate("Form Three",schedule,"form3");
generate("Form Four",schedule,"form4");

setTimeout(()=>{
addDropdowns();

let saved=localStorage.getItem("savedRow");

if(saved){

saved=JSON.parse(saved);

let table=document.querySelector("table."+saved.table);

let row=table.querySelectorAll("tr")[saved.row];

table.querySelectorAll("tr").forEach(r=>{
if(r!==row && r.querySelector("td")) r.style.display="none";
});

}

},500);

</script>
